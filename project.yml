name: FreshKeeper
options:
  bundleIdPrefix: com.freshkeeper
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  FreshKeeper:
    type: application
    platform: iOS
    sources:
      - FreshKeeper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FreshKeeper
        INFOPLIST_KEY_NSCameraUsageDescription: "食品のバーコードと賞味期限をスキャンするためにカメラを使用します"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
    dependencies:
      - target: FreshKeeperWidgetExtension
        embed: true

  FreshKeeperWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - FreshKeeperWidget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.freshkeeper.FreshKeeper.Widget
        INFOPLIST_KEY_CFBundleDisplayName: FreshKeeperWidget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        SWIFT_VERSION: "6.0"

  FreshKeeperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FreshKeeperTests
    dependencies:
      - target: FreshKeeper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FreshKeeper.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/FreshKeeper"

  FreshKeeperUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FreshKeeperUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: FreshKeeper
